# Builds the @quack/api container (apps/api/Dockerfile, context = repo root)
# and pushes it for Cloud Run. Run: gcloud builds submit --config cloudbuild.yaml .
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - gcr.io/$PROJECT_ID/quack-api:latest
      - .
images:
  - gcr.io/$PROJECT_ID/quack-api:latest
options:
  logging: CLOUD_LOGGING_ONLY
